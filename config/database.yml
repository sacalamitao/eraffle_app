default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS", 5) %>
  timeout: 5000

  # Use DATABASE_URL if present (Supabase or any hosted DB)
  url: <%= ENV["DATABASE_URL"] %>

  # SSL required for hosted providers like Supabase
  sslmode: <%= ENV.fetch("DB_SSLMODE", "require") %>

development:
  <<: *default

  # Fallback to local DB if DATABASE_URL is not set
  database: <%= ENV.fetch("DB_NAME", "eraffle_app_development") %>
  username: <%= ENV["DB_USERNAME"] %>
  password: <%= ENV["DB_PASSWORD"] %>
  host: <%= ENV.fetch("DB_HOST", "localhost") %>
  port: <%= ENV.fetch("DB_PORT", 5432) %>

test:
  <<: *default
  database: <%= ENV.fetch("DB_TEST_NAME", "eraffle_app_test") %>
  host: <%= ENV.fetch("DB_HOST", "localhost") %>

production:
  <<: *default

  # Enforce DATABASE_URL usage in production
  url: <%= ENV.fetch("DATABASE_URL") %>

  # Better production safety
  prepared_statements: false
  variables:
    statement_timeout: <%= ENV.fetch("DB_STATEMENT_TIMEOUT", 5000) %>